<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جرس البيت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06060f; --bg2:#0e0e22; --card:#141432; --border:#252550;
            --gold:#ffc83d; --gold-dim:rgba(255,200,61,0.15); --gold-glow:rgba(255,200,61,0.25);
            --red:#ff4466; --red-dim:rgba(255,68,102,0.12);
            --green:#2ddc6f; --green-dim:rgba(45,220,111,0.12);
            --text:#eeeef6; --dim:#6a6a90; --radius:16px;
        }
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
        .screen{display:none;min-height:100dvh;flex-direction:column}
        .screen.active{display:flex}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 28px;border:none;border-radius:var(--radius);font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:transform 0.15s}
        .btn:active{transform:scale(0.97)}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#f0a020);color:#1a1000;box-shadow:0 4px 24px var(--gold-glow)}
        .btn-ghost{background:var(--card);color:var(--dim);border:1.5px solid var(--border)}
        .btn-red{background:var(--red-dim);color:var(--red)}
        .btn-sm{padding:10px 18px;font-size:14px;border-radius:10px}

        .input-field{width:100%;padding:14px 18px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:17px;outline:none}
        .input-field:focus{border-color:var(--gold)}
        .input-field::placeholder{color:var(--dim)}

        .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}

        /* HOME */
        #home{align-items:center;justify-content:center;gap:36px;background:radial-gradient(ellipse at 50% 30%,#18184a 0%,var(--bg) 65%)}
        .home-bell{font-size:88px;display:inline-block;animation:swing 2.5s ease-in-out infinite;filter:drop-shadow(0 0 30px var(--gold-glow))}
        @keyframes swing{0%,100%{transform:rotate(0)}20%{transform:rotate(18deg)}40%{transform:rotate(-14deg)}60%{transform:rotate(8deg)}80%{transform:rotate(-4deg)}}
        .home-title{font-size:46px;font-weight:900;background:linear-gradient(135deg,var(--gold),#ff9f00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .home-sub{color:var(--dim);font-size:17px;margin-top:4px}
        .home-actions{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px}

        /* SETUP */
        #setup{padding:24px 20px;gap:16px;align-items:center}
        .setup-title{font-size:26px;font-weight:800;color:var(--gold)}
        .setup-desc{color:var(--dim);font-size:14px;margin-top:4px}
        .players-container{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px}
        .player-row{display:flex;align-items:center;gap:10px;background:var(--card);padding:10px 14px;border-radius:14px;border:1px solid var(--border);animation:fadeUp 0.25s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .player-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
        .player-row input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Tajawal',sans-serif;font-size:17px}
        .player-row input::placeholder{color:var(--dim)}
        .remove-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--red-dim);color:var(--red);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .add-btn{width:100%;padding:12px;border-radius:14px;border:2px dashed var(--border);background:transparent;color:var(--dim);font-family:'Tajawal',sans-serif;font-size:15px;cursor:pointer}
        .add-btn:hover{border-color:var(--gold);color:var(--gold)}
        .setup-actions{width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px;margin-top:12px}

        /* LOCAL */
        #gameLocal{padding:0}
        .local-header{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .local-round{font-size:14px;color:var(--dim)}
        .local-controls{display:flex;gap:8px}
        .local-body{flex:1;display:flex;flex-direction:column}
        .judge-bar{text-align:center;padding:20px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .judge-waiting{color:var(--dim);font-size:20px}
        .judge-waiting-icon{font-size:40px;opacity:0.4;animation:breathe 2s ease-in-out infinite}
        @keyframes breathe{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.5;transform:scale(1.06)}}
        .judge-winner{display:none;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        .judge-winner.show{display:block}
        @keyframes popIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
        .judge-winner-emoji{font-size:48px}
        .judge-winner-label{font-size:14px;color:var(--gold);font-weight:700;margin-top:4px}
        .judge-winner-name{font-size:38px;font-weight:900;margin-top:2px}

        .buzzer-grid{flex:1;display:grid;gap:0;width:100%}
        .buzzer-grid.cols-1{grid-template-columns:1fr}
        .buzzer-grid.cols-2{grid-template-columns:1fr 1fr}
        .buzzer-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;cursor:pointer;position:relative;transition:filter 0.15s,transform 0.1s;border:1px solid rgba(255,255,255,0.04);min-height:120px;touch-action:manipulation}
        .buzzer-cell:active{transform:scale(0.97)}
        .buzzer-cell.disabled{filter:brightness(0.3) saturate(0.3);cursor:default;pointer-events:none}
        .buzzer-cell.winner-cell{animation:winGlow 0.8s ease-in-out infinite alternate}
        @keyframes winGlow{from{filter:brightness(1.1)}to{filter:brightness(1.3)}}
        .buzzer-cell.pressed-cell{filter:brightness(0.5) saturate(0.5);pointer-events:none}
        .cell-bell{font-size:44px}
        .cell-name{font-size:22px;font-weight:800;margin-top:6px;text-shadow:0 2px 8px rgba(0,0,0,0.4)}
        .cell-rank{position:absolute;top:10px;left:10px;font-size:24px;font-weight:900;opacity:0}
        .cell-rank.show{opacity:1;animation:fadeUp 0.3s ease}

        .pc-0{background:linear-gradient(135deg,#c0392b,#96281b)} .pc-1{background:linear-gradient(135deg,#2b6ec0,#1b4496)}
        .pc-2{background:linear-gradient(135deg,#1b8c5a,#126b42)} .pc-3{background:linear-gradient(135deg,#c07b2b,#96601b)}
        .pc-4{background:linear-gradient(135deg,#8e44ad,#6c3382)} .pc-5{background:linear-gradient(135deg,#16a085,#0e7c65)}
        .pc-6{background:linear-gradient(135deg,#c0392b,#e74c3c)} .pc-7{background:linear-gradient(135deg,#2c3e50,#34495e)}
        .dot-0{background:#e74c3c;color:#fff} .dot-1{background:#3498db;color:#fff} .dot-2{background:#2ecc71;color:#000}
        .dot-3{background:#f39c12;color:#000} .dot-4{background:#9b59b6;color:#fff} .dot-5{background:#1abc9c;color:#000}
        .dot-6{background:#e67e22;color:#fff} .dot-7{background:#2c3e50;color:#fff}

        /* JUDGE MULTI */
        #gameJudge{padding:0}
        .mj-header{padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .mj-code{font-size:28px;font-weight:900;letter-spacing:6px;color:var(--gold);direction:ltr}
        .mj-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
        .mj-waiting{text-align:center}
        .mj-waiting-icon{font-size:56px;opacity:0.4;animation:breathe 2s ease-in-out infinite}
        .mj-waiting-text{font-size:20px;color:var(--dim);margin-top:12px}
        .mj-winner{display:none;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        .mj-winner.show{display:block}
        .mj-winner-crown{font-size:56px}
        .mj-winner-label{font-size:18px;color:var(--gold);font-weight:700;margin-top:8px}
        .mj-winner-name{font-size:48px;font-weight:900;margin-top:4px}
        .mj-order{width:100%;max-width:420px;margin-top:28px}
        .mj-order-title{font-size:15px;color:var(--dim);margin-bottom:8px;text-align:center}
        .mj-order-list{display:flex;flex-direction:column;gap:6px}
        .mj-order-item{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border-radius:10px}
        .mj-order-rank{font-weight:900;font-size:16px;width:28px;text-align:center}
        .mj-order-rank.r1{color:var(--gold)} .mj-order-rank.r2{color:#c0c0c0} .mj-order-rank.r3{color:#cd7f32}
        .mj-order-pname{flex:1;font-weight:600}
        .mj-players{width:100%;max-width:420px;padding:16px 20px}
        .mj-players-title{font-size:14px;color:var(--dim);text-align:center;margin-bottom:8px}
        .mj-players-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
        .mj-chip{padding:5px 12px;border-radius:16px;font-size:13px;font-weight:700;background:var(--card);border:1px solid var(--border)}
        .mj-chip.online{border-color:var(--green);color:var(--green)}

        /* PLAYER */
        #gamePlayer{padding:0}
        .gp-header{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .gp-name{font-size:18px;font-weight:800}
        .gp-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
        .big-buzzer{width:min(260px,65vw);height:min(260px,65vw);border-radius:50%;border:none;cursor:pointer;position:relative;transition:transform 0.1s;touch-action:manipulation}
        .big-buzzer:active{transform:scale(0.94)}
        .big-buzzer.ready{background:radial-gradient(circle at 38% 32%,#ff6666,#cc1111 55%,#880000);box-shadow:0 0 50px rgba(255,0,0,0.25),0 10px 40px rgba(0,0,0,0.4),inset 0 -10px 25px rgba(0,0,0,0.3),inset 0 10px 25px rgba(255,255,255,0.08)}
        .big-buzzer.ready::after{content:'🔔';font-size:66px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
        .big-buzzer.done{background:radial-gradient(circle at 38% 32%,#444a6a,#28304a 55%,#161a30);box-shadow:0 4px 16px rgba(0,0,0,0.3);cursor:default}
        .big-buzzer.done::after{content:'✓';font-size:66px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--green)}
        .big-buzzer.locked{background:radial-gradient(circle at 38% 32%,#333,#1a1a1a 55%,#0d0d0d);box-shadow:0 4px 16px rgba(0,0,0,0.3);cursor:not-allowed}
        .big-buzzer.locked::after{content:'🔒';font-size:54px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
        .buzz-msg{margin-top:20px;font-size:18px;color:var(--dim);text-align:center}
        .buzz-msg.win{color:var(--green);font-weight:800;font-size:22px}
        .buzz-msg.lose{color:var(--red);font-weight:700}

        /* JOIN */
        #join{align-items:center;justify-content:center;gap:20px;padding:24px}
        .join-title{font-size:26px;font-weight:800;color:var(--gold)}
        .join-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
        .join-form .input-field.code{text-align:center;letter-spacing:8px;font-size:26px;font-weight:900;direction:ltr}
        .join-err{color:var(--red);font-size:14px;text-align:center;min-height:18px}

        /* LOADING */
        .loading-overlay{position:fixed;inset:0;background:rgba(6,6,15,0.9);z-index:10000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
        .loading-overlay.show{display:flex}
        .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{color:var(--dim);font-size:16px}

        .confetti-box{position:fixed;inset:0;pointer-events:none;z-index:9999}
        .conf{position:absolute;top:-12px;animation:confDrop linear forwards}
        @keyframes confDrop{to{top:105vh;transform:rotate(900deg)}}

        @media(max-height:550px){.home-bell{font-size:56px}.home-title{font-size:34px}}
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">جاري الاتصال...</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
    <div style="text-align:center">
        <div class="home-bell">🔔</div>
        <div class="home-title">جرس البيت</div>
        <div class="home-sub">من يضغط أولاً؟</div>
    </div>
    <div class="home-actions">
        <button class="btn btn-gold" onclick="goSetup()">🏛️ إنشاء غرفة (الحكم)</button>
        <button class="btn btn-ghost" onclick="goJoin()">🎮 انضمام كلاعب</button>
    </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
    <div style="text-align:center">
        <div class="setup-title">إعداد اللاعبين</div>
        <div class="setup-desc">أضف أسماء اللاعبين ثم ابدأ</div>
    </div>
    <div id="playersBox" class="players-container"></div>
    <button class="add-btn" style="max-width:440px" onclick="addP()">+ إضافة لاعب</button>
    <div class="setup-actions">
        <button class="btn btn-gold" onclick="launchGame()">🚀 ابدأ اللعبة</button>
        <button class="btn btn-ghost" onclick="goHome()">رجوع</button>
    </div>
</div>

<!-- JUDGE -->
<div id="gameJudge" class="screen">
    <div class="mj-header">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="badge" style="background:var(--gold-dim);color:var(--gold)">⚖️ الحكم</div>
            <div>
                <div style="font-size:11px;color:var(--dim)">رمز الغرفة</div>
                <div class="mj-code" id="mjCode"></div>
            </div>
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-red btn-sm" onclick="mjReset()">🔄 جولة جديدة</button>
            <button class="btn btn-ghost btn-sm" onclick="mjEnd()">🏠</button>
        </div>
    </div>
    <div class="mj-body">
        <div id="mjWaiting" class="mj-waiting">
            <div class="mj-waiting-icon">⏳</div>
            <div class="mj-waiting-text">في انتظار الضغط...</div>
        </div>
        <div id="mjWinner" class="mj-winner"></div>
        <div id="mjOrder" class="mj-order" style="display:none"></div>
    </div>
    <div class="mj-players">
        <div class="mj-players-title" id="mjPlayersTitle">اللاعبون</div>
        <div class="mj-players-chips" id="mjChips"></div>
    </div>
</div>

<!-- PLAYER -->
<div id="gamePlayer" class="screen">
    <div class="gp-header">
        <div class="gp-name" id="gpName"></div>
        <div class="badge" id="gpBadge" style="background:var(--green-dim);color:var(--green)">جاهز</div>
    </div>
    <div class="gp-body">
        <button class="big-buzzer ready" id="gpBuzzer" ontouchstart="gpBuzz(event)" onmousedown="gpBuzz(event)"></button>
        <div class="buzz-msg" id="gpMsg">اضغط الجرس!</div>
    </div>
</div>

<!-- JOIN -->
<div id="join" class="screen">
    <div class="join-title">انضمام للغرفة</div>
    <div class="join-form">
        <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:13px;color:var(--dim);font-weight:600">رمز الغرفة</label>
            <input type="text" id="joinCode" class="input-field code" maxlength="5" placeholder="-----" autocomplete="off">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:13px;color:var(--dim);font-weight:600">اسمك</label>
            <input type="text" id="joinName" class="input-field" placeholder="أدخل اسمك" autocomplete="off">
        </div>
        <div class="join-err" id="joinErr"></div>
        <button class="btn btn-gold" onclick="doJoin()">🎮 انضمام</button>
        <button class="btn btn-ghost" onclick="goHome()">رجوع</button>
    </div>
</div>

<div class="confetti-box" id="confettiBox"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* =================================================================
   جرس البيت v3
   Firebase مدمج — ما يحتاج أي إعداد
   الحكم ينشئ غرفة → اللاعبين يدخلون الرمز → أول واحد يضغط يفوز
   الحكم = المرجع الوحيد لتحديد الفائز (يستخدم server timestamp)
   صوت الجرس يطلع من جهاز الفائز
   ================================================================= */

// ===== FIREBASE CONFIG (مدمج) =====
firebase.initializeApp({
    apiKey: "AIzaSyCY7hzK7j4qKpfGFO38GGRl9rojsKQ6MTw",
    authDomain: "jars-albait.firebaseapp.com",
    databaseURL: "https://jars-albait-default-rtdb.firebaseio.com",
    projectId: "jars-albait",
    storageBucket: "jars-albait.firebasestorage.app",
    messagingSenderId: "305150537977",
    appId: "1:305150537977:web:a29c5e290ee839ff157228",
    measurementId: "G-ZGLR8TW2CN"
});
const fb = firebase.database();

let fbRoom = null, fbListeners = [];

function showLoading(t){document.getElementById('loadingText').textContent=t||'جاري الاتصال...';document.getElementById('loadingOverlay').classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

// ===== AUDIO =====
let _actx=null;
function getAudio(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume();return _actx}
function playBell(){
    try{
        const c=getAudio(),t=c.currentTime;
        // Main bell strike
        const o1=c.createOscillator(),g1=c.createGain();
        o1.type='sine';o1.frequency.setValueAtTime(840,t);o1.frequency.exponentialRampToValueAtTime(820,t+0.6);
        g1.gain.setValueAtTime(0.6,t);g1.gain.exponentialRampToValueAtTime(0.001,t+1.5);
        o1.connect(g1);g1.connect(c.destination);o1.start(t);o1.stop(t+1.5);
        // Overtone
        const o2=c.createOscillator(),g2=c.createGain();
        o2.type='sine';o2.frequency.setValueAtTime(1680,t);
        g2.gain.setValueAtTime(0.3,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+0.8);
        // High shimmer
        const o3=c.createOscillator(),g3=c.createGain();
        o3.type='sine';o3.frequency.setValueAtTime(2520,t);
        g3.gain.setValueAtTime(0.15,t);g3.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o3.connect(g3);g3.connect(c.destination);o3.start(t);o3.stop(t+0.4);
    }catch(e){}
}

// ===== STATE =====
let setupPlayers=[];
let roomCode='',mjRoundNum=0,mjRoundActive=false,mjPresses=[],mjPlayers=[];
let myId='',myName='',gpRoundActive=false,gpPressed=false,gpCurrentRoundNum=0;

// ===== SCREENS =====
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){cleanupFB();show('home')}
function goSetup(){setupPlayers=[];addP();addP();renderPlayers();show('setup')}
function goJoin(){
    const p=new URLSearchParams(location.search);
    if(p.get('room'))document.getElementById('joinCode').value=p.get('room').toUpperCase();
    document.getElementById('joinErr').textContent='';show('join');
}

// ===== SETUP =====
function renderPlayers(){
    const box=document.getElementById('playersBox');box.innerHTML='';
    setupPlayers.forEach((p,i)=>{
        const row=document.createElement('div');row.className='player-row';
        row.innerHTML=`<div class="player-dot dot-${i%8}">${i+1}</div>
            <input type="text" placeholder="اسم اللاعب ${i+1}" value="${p.name}" data-i="${i}" autocomplete="off">
            ${setupPlayers.length>2?`<button class="remove-btn" onclick="removeP(${i})">×</button>`:''}`;
        row.querySelector('input').addEventListener('input',e=>{setupPlayers[+e.target.dataset.i].name=e.target.value.trim()});
        box.appendChild(row);
    });
}
function addP(){if(setupPlayers.length>=8)return;setupPlayers.push({id:'p'+Date.now()+Math.random().toString(36).substr(2,4),name:''});renderPlayers()}
function removeP(i){setupPlayers.splice(i,1);renderPlayers()}

function launchGame(){
    const valid=setupPlayers.filter(p=>p.name);
    if(valid.length<2){alert('أدخل أسماء لاعبين اثنين على الأقل');return}
    setupPlayers=valid;
    try{getAudio()}catch(e){}
    startJudge();
}

// ===== JUDGE =====
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<5;i++)s+=c[Math.floor(Math.random()*c.length)];return s}

async function startJudge(){
    showLoading('جاري إنشاء الغرفة...');
    roomCode=genCode();
    mjPlayers=setupPlayers.map(p=>({...p}));
    mjRoundNum=0;mjPresses=[];mjRoundActive=false;

    try{
        fbRoom=fb.ref('rooms/'+roomCode);
        const playersObj={};
        mjPlayers.forEach(p=>{playersObj[p.id]={name:p.name,id:p.id}});
        await fbRoom.set({
            players:playersObj,
            round:{num:0,active:false,winnerId:null,winnerName:null},
            createdAt:firebase.database.ServerValue.TIMESTAMP
        });

        // Listen for players joining
        fbRoom.child('players').on('child_added',snap=>{
            const p=snap.val();
            if(!mjPlayers.some(mp=>mp.id===p.id))mjPlayers.push(p);
            updateChips();
        });
        fbListeners.push(()=>fbRoom.child('players').off());

        hideLoading();
        document.getElementById('mjCode').textContent=roomCode;
        updateChips();
        mjReset();
        show('gameJudge');
    }catch(e){
        hideLoading();console.error(e);
        alert('خطأ في الاتصال بـ Firebase');
    }
}

function listenPresses(){
    fbRoom.child('presses').off();
    fbRoom.child('presses').on('child_added',snap=>{
        const data=snap.val();
        if(!mjRoundActive)return;
        if(data.roundNum!==mjRoundNum)return;
        if(mjPresses.some(p=>p.playerId===data.playerId))return;

        const pData=mjPlayers.find(p=>p.id===data.playerId);
        const entry={
            playerId:data.playerId,
            playerName:pData?pData.name:data.playerName,
            order:mjPresses.length+1
        };
        mjPresses.push(entry);

        if(entry.order===1){
            // WINNER — الأول
            mjRoundActive=false;
            fbRoom.child('round').update({active:false,winnerId:data.playerId,winnerName:entry.playerName});
            // Show winner
            document.getElementById('mjWaiting').style.display='none';
            const w=document.getElementById('mjWinner');
            w.innerHTML=`<div class="mj-winner-crown">👑</div><div class="mj-winner-label">الأول!</div><div class="mj-winner-name">${entry.playerName}</div>`;
            w.className='mj-winner show';
            fireConfetti();
        }
        updateOrder();
    });
}

function updateOrder(){
    const box=document.getElementById('mjOrder');
    if(!mjPresses.length){box.style.display='none';return}
    box.style.display='block';
    const r=['','r1','r2','r3'];
    box.innerHTML=`<div class="mj-order-title">ترتيب الضغط</div><div class="mj-order-list">${
        mjPresses.map((p,i)=>`<div class="mj-order-item"><div class="mj-order-rank ${r[i+1]||''}">${i+1}</div><div class="mj-order-pname">${p.playerName}</div></div>`).join('')
    }</div>`;
}

function updateChips(){
    document.getElementById('mjChips').innerHTML=mjPlayers.map(p=>`<div class="mj-chip online">${p.name}</div>`).join('');
    document.getElementById('mjPlayersTitle').textContent=`اللاعبون (${mjPlayers.length})`;
}

async function mjReset(){
    mjRoundNum++;mjRoundActive=true;mjPresses=[];
    document.getElementById('mjWaiting').style.display='block';
    document.getElementById('mjWinner').className='mj-winner';
    document.getElementById('mjWinner').innerHTML='';
    document.getElementById('mjOrder').style.display='none';

    await fbRoom.child('presses').remove();
    await fbRoom.child('round').set({
        num:mjRoundNum,active:true,
        winnerId:null,winnerName:null,
        startedAt:firebase.database.ServerValue.TIMESTAMP
    });
    listenPresses();
}

async function mjEnd(){
    if(fbRoom){
        try{await fbRoom.update({ended:true})}catch(e){}
        setTimeout(()=>{try{fbRoom.remove()}catch(e){}},3000);
    }
    cleanupFB();goHome();
}

// ===== PLAYER =====
async function doJoin(){
    const code=document.getElementById('joinCode').value.toUpperCase().trim();
    const name=document.getElementById('joinName').value.trim();
    if(code.length<4){document.getElementById('joinErr').textContent='أدخل رمز الغرفة';return}
    if(!name){document.getElementById('joinErr').textContent='أدخل اسمك';return}

    showLoading('جاري البحث عن الغرفة...');
    roomCode=code;

    try{
        fbRoom=fb.ref('rooms/'+code);
        const snap=await fbRoom.once('value');
        if(!snap.exists()){hideLoading();document.getElementById('joinErr').textContent='الغرفة غير موجودة';return}
        const room=snap.val();
        if(room.ended){hideLoading();document.getElementById('joinErr').textContent='هذه الغرفة انتهت';return}

        myId='p'+Date.now()+Math.random().toString(36).substr(2,4);
        myName=name;gpPressed=false;
        gpCurrentRoundNum=room.round?room.round.num:0;
        gpRoundActive=room.round&&room.round.active;

        // Register as player
        await fbRoom.child('players/'+myId).set({id:myId,name:myName});

        try{getAudio()}catch(e){}

        // Listen for round changes
        const onRound=fbRoom.child('round').on('value',snap=>{
            const round=snap.val();if(!round)return;

            // New round started
            if(round.active && round.num>gpCurrentRoundNum){
                gpCurrentRoundNum=round.num;
                gpRoundActive=true;gpPressed=false;
                gpEnable();
            }
            // Round ended — winner decided
            if(!round.active && round.winnerId && round.num===gpCurrentRoundNum){
                gpRoundActive=false;
                if(round.winnerId===myId){
                    playBell();
                    gpResult('win');
                }else if(!gpPressed){
                    gpLock(round.winnerName+' ضغط أولاً!');
                }else{
                    gpResult('lose',round.winnerName);
                }
            }
        });
        fbListeners.push(()=>fbRoom.child('round').off('value',onRound));

        // Listen for game end
        const onEnd=fbRoom.child('ended').on('value',snap=>{
            if(snap.val()===true){cleanupFB();goHome()}
        });
        fbListeners.push(()=>fbRoom.child('ended').off('value',onEnd));

        hideLoading();
        document.getElementById('gpName').textContent=name;
        if(gpRoundActive)gpEnable();else gpLock('في انتظار الجولة القادمة');
        show('gamePlayer');
    }catch(e){
        hideLoading();console.error(e);
        document.getElementById('joinErr').textContent='خطأ في الاتصال';
    }
}

async function gpBuzz(e){
    e.preventDefault();
    if(!gpRoundActive||gpPressed)return;
    gpPressed=true;

    document.getElementById('gpBuzzer').className='big-buzzer done';
    document.getElementById('gpMsg').textContent='ضغطت! في انتظار النتيجة...';
    document.getElementById('gpMsg').className='buzz-msg';

    try{
        // Server timestamp ensures fair ordering regardless of device clock
        await fbRoom.child('presses/'+myId).set({
            playerId:myId,
            playerName:myName,
            roundNum:gpCurrentRoundNum,
            timestamp:firebase.database.ServerValue.TIMESTAMP
        });
    }catch(e){console.error('Buzz error:',e)}
}

function gpEnable(){
    document.getElementById('gpBuzzer').className='big-buzzer ready';
    document.getElementById('gpMsg').textContent='اضغط الجرس!';
    document.getElementById('gpMsg').className='buzz-msg';
    document.getElementById('gpBadge').textContent='جاهز';
    document.getElementById('gpBadge').style.cssText='background:var(--green-dim);color:var(--green)';
}
function gpLock(msg){
    document.getElementById('gpBuzzer').className='big-buzzer locked';
    document.getElementById('gpMsg').textContent=msg;
    document.getElementById('gpMsg').className='buzz-msg lose';
    document.getElementById('gpBadge').textContent='انتهت';
    document.getElementById('gpBadge').style.cssText='background:var(--red-dim);color:var(--red)';
    gpRoundActive=false;
}
function gpResult(r,winner){
    if(r==='win'){
        document.getElementById('gpBuzzer').className='big-buzzer done';
        document.getElementById('gpMsg').textContent='🎉 أنت الأول!';
        document.getElementById('gpMsg').className='buzz-msg win';
        document.getElementById('gpBadge').textContent='🏆 الأول';
        document.getElementById('gpBadge').style.cssText='background:var(--gold-dim);color:var(--gold)';
    }else{
        document.getElementById('gpBuzzer').className='big-buzzer locked';
        document.getElementById('gpMsg').textContent=(winner||'')+' ضغط أولاً';
        document.getElementById('gpMsg').className='buzz-msg lose';
        document.getElementById('gpBadge').textContent='متأخر';
        document.getElementById('gpBadge').style.cssText='background:var(--red-dim);color:var(--red)';
    }
}

// ===== CLEANUP =====
function cleanupFB(){
    fbListeners.forEach(fn=>{try{fn()}catch(e){}});
    fbListeners=[];
    if(fbRoom){try{fbRoom.off()}catch(e){}}
    fbRoom=null;
}

// ===== CONFETTI =====
function fireConfetti(){
    const box=document.getElementById('confettiBox');box.innerHTML='';
    const cols=['#ffc83d','#ff4466','#5b8aff','#2ddc6f','#b06aff','#ff9f00'];
    for(let i=0;i<60;i++){
        const d=document.createElement('div');d.className='conf';
        d.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*0.6}s`;
        box.appendChild(d);
    }
    setTimeout(()=>box.innerHTML='',4500);
}

// ===== INIT =====
(function(){
    const p=new URLSearchParams(location.search);
    if(p.get('room'))goJoin();
})();
</script>
